<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Removal Tool</title>
</head>
<body>
    <h1>Background Removal Tool</h1>
    <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" id="imageInput" name="image" accept="image/*" required><br><br>
        <button type="submit">Upload Image</button>
    </form>

    <h2>Processed Image</h2>
    <img id="resultImage" src="" alt="Processed Image" style="display:none;">
    
    <button id="removeButton" style="display:none;">Remove Background</button>

    <script>
        document.getElementById("uploadForm").addEventListener("submit", function(event) {
            event.preventDefault();

            const formData = new FormData();
            const imageInput = document.getElementById("imageInput").files[0];
            formData.append("image", imageInput);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.blob())
            .then(imageBlob => {
                const imageUrl = URL.createObjectURL(imageBlob);
                document.getElementById("resultImage").src = imageUrl;
                document.getElementById("resultImage").style.display = 'block';
                document.getElementById("removeButton").style.display = 'block';
            })
            .catch(error => {
                console.error('Error uploading image:', error);
            });
        });
    </script>
</body>
</html>
